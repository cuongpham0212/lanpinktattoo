<!DOCTYPE html>

<html lang="{{ .Site.Language.Lang }}" data-theme="dark">

<head>
  {{ partial "head.html" . }}
  {{ partial "schema-localbusiness.html" . }}
</head>

<body>

{{ partial "header.html" . }}

  <main>
    {{ block "main" . }}
    {{ end }}
  </main>

{{ partial "map.html" . }}

{{ partial "footer.html" . }}

{{ $theme := resources.Get "js/theme.js" | minify }}

<script
  src="{{ $theme.RelPermalink }}"
  defer
></script>

<script>
document.addEventListener('click', function (event) {
  const link = event.target.closest('.lp-mobile-toc a');
  if (!link) return;

  const details = link.closest('details');
  if (details) {
    details.open = false;
  }
});
</script>

</body>

</html>
