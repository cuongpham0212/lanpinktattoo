<!DOCTYPE html>

<html lang="{{ .Site.Language.Lang }}" data-theme="dark">

<head>
  {{ partial "head.html" . }}
</head>

<body>

{{ partial "header.html" . }}

  <main>
    {{ block "main" . }}
    {{ end }}
  </main>

{{ partial "map.html" . }}

{{ partial "footer.html" . }}

{{ $theme := resources.Get "js/theme.js" | minify }}

<script
  src="{{ $theme.RelPermalink }}"
  defer
></script>

</body>

</html>
