<section class="lp-map-section border-t border-zinc-800 bg-zinc-950 py-10">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="grid gap-6 lg:grid-cols-[0.8fr_1.2fr] lg:items-stretch">

      <div class="lp-map-info">
        <span class="text-pink-500 font-semibold uppercase tracking-wider">
          {{ i18n "contact" }}
        </span>

        <h2 class="mt-3 text-3xl font-bold text-white">
          {{ i18n "studio_name" }}
        </h2>

        <div class="mt-5 space-y-2 text-sm text-zinc-300">
          <p>{{ i18n "address" }}</p>
          <p>{{ i18n "working_hours" }}</p>
          <p>{{ i18n "booking_note" }}</p>
        </div>

        <div class="mt-6 flex flex-wrap gap-3">
          <a
            href="https://maps.app.goo.gl/FWkCMzaZBN5G6rZJ9"
            target="_blank"
            rel="noopener noreferrer"
            class="lp-btn lp-btn-primary text-sm">
            {{ i18n "directions" }}
          </a>

          <a
            href="{{ if eq .Language.Lang "vi" }}{{ "/dat-lich/" | relLangURL }}{{ else }}{{ "/booking/" | relLangURL }}{{ end }}"
            class="lp-btn lp-btn-secondary text-sm">
            {{ i18n "book_now" }}
          </a>

          <a
            href="https://maps.app.goo.gl/FWkCMzaZBN5G6rZJ9"
            target="_blank"
            rel="noopener noreferrer"
            class="lp-btn lp-btn-ghost text-sm">
            {{ i18n "view_google" }}
          </a>
        </div>
      </div>

      <div class="lp-map-card overflow-hidden rounded-2xl border border-zinc-800 shadow-xl">
        <iframe
          title="Lan Pink Tattoo Google Maps"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3918.297687683675!2d106.64560557518416!3d10.864947757554367!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3175297e1d5f90ad%3A0x6dcd055198206b25!2slanpink%20ink%20-%20Private%20Tattoo%20studio!5e0!3m2!1svi!2s!4v1780945708400!5m2!1svi!2s"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen>
        </iframe>
      </div>

    </div>
  </div>
</section>
