<button
  id="lp-back-to-top"
  type="button"
  aria-label="{{ if eq .Language.Lang "vi" }}Lên đầu trang{{ else }}Back to top{{ end }}"
>
  ↑
</button>

<style>
  #lp-back-to-top {
    position: fixed;
    right: 18px;
    bottom: 22px;
    z-index: 60;
    width: 46px;
    height: 46px;
    border: 1px solid rgba(236, 72, 153, 0.24);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.42);
    color: #be185d;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    box-shadow: 0 10px 26px rgba(236, 72, 153, 0.12);
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    transition:
      opacity 0.22s ease,
      visibility 0.22s ease,
      transform 0.22s ease,
      background 0.22s ease;
  }

  #lp-back-to-top.is-visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  #lp-back-to-top:hover {
    background: rgba(255, 255, 255, 0.68);
    color: #be185d;
  }

  html[data-theme="dark"] #lp-back-to-top {
    background: rgba(24, 24, 27, 0.46);
    color: #fbcfe8;
    border-color: rgba(249, 168, 212, 0.22);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.24);
  }

  @media (max-width: 640px) {
    #lp-back-to-top {
      right: 14px;
      bottom: 16px;
      width: 42px;
      height: 42px;
      font-size: 20px;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const button = document.getElementById('lp-back-to-top');

    if (!button) return;

    function toggleBackToTop() {
      if (window.scrollY > 420) {
        button.classList.add('is-visible');
      } else {
        button.classList.remove('is-visible');
      }
    }

    button.addEventListener('click', function () {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });

    window.addEventListener('scroll', toggleBackToTop, { passive: true });
    toggleBackToTop();
  });
</script>
