<button
  id="lp-back-to-top"
  type="button"
  aria-label="{{ if eq .Language.Lang "vi" }}Lên đầu trang{{ else }}Back to top{{ end }}"
>
  ↑
</button>

<style>
  #lp-back-to-top {
    position: fixed;
    right: 18px;
    bottom: 16px;
    z-index: 9995;
    width: 44px;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(236, 72, 153, 0.32);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    color: #be185d;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    box-shadow: 0 12px 30px rgba(190, 24, 93, 0.22);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.22s ease, visibility 0.22s ease, transform 0.22s ease, background 0.22s ease;
  }

  #lp-back-to-top.is-visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    pointer-events: auto;
  }

  #lp-back-to-top:hover {
    background: #fff;
    color: #9d174d;
    transform: translateY(-2px);
  }

  html[data-theme="dark"] #lp-back-to-top {
    background: rgba(24, 24, 27, 0.92);
    color: #f9a8d4;
    border-color: rgba(249, 168, 212, 0.32);
  }

  @media (max-width: 768px) {
    #lp-back-to-top {
      right: 14px;
      bottom: 16px;
      width: 42px;
      height: 42px;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const button = document.getElementById('lp-back-to-top');

    if (!button) return;

    function toggleBackToTop() {
      button.classList.toggle('is-visible', window.scrollY > 300);
    }

    button.addEventListener('click', function () {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });

    window.addEventListener('scroll', toggleBackToTop, { passive: true });
    toggleBackToTop();
  });
</script>
