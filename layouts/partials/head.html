<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>
{{ if .IsHome }}
{{ .Site.Title }}
{{ else }}
{{ .Title }} | {{ .Site.Title }}
{{ end }}
</title>

<meta
name="description"
content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<meta
name="author"
content="{{ .Site.Params.author }}">

<meta
name="robots"
content="index, follow">

<meta
name="theme-color"
content="#ec4899">

<link
rel="canonical"
href="{{ .Permalink }}">

<!-- Google Search Console -->

<meta
name="google-site-verification"
content="DAN_MA_XAC_MINH_VAO_DAY">

<!-- Hreflang -->

{{ range .AllTranslations }}

<link
rel="alternate"
hreflang="{{ .Language.Lang }}"
href="{{ .Permalink }}">

{{ end }}

<!-- Open Graph -->

<meta property="og:type" content="website">

<meta
property="og:title"
content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">

<meta
property="og:description"
content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<meta
property="og:url"
content="{{ .Permalink }}">

<meta
property="og:site_name"
content="{{ .Site.Title }}">

<meta
property="og:image"
content="{{ "images/og-cover.jpg" | absURL }}">

<!-- Twitter -->

<meta
name="twitter:card"
content="summary_large_image">

<meta
name="twitter:title"
content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">

<meta
name="twitter:description"
content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<meta
name="twitter:image"
content="{{ "images/og-cover.jpg" | absURL }}">

<!-- CSS -->

<link
rel="stylesheet"
href="/css/style.css">

<!-- Favicon -->

<link
rel="icon"
href="/favicon.ico">

<!-- Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">
