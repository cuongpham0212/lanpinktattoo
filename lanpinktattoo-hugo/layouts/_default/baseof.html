<!DOCTYPE html>
<html lang="{{.Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ i18n "meta_title" }}</title>
    <meta name="description" content="{{ i18n "meta_desc" }}">
    <meta name="keywords" content="{{ i18n "keywords" }}">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#services">{{ i18n "nav_services" }}</a>
            <a href="#gallery">{{ i18n "nav_gallery" }}</a>
            <a href="#map">{{ i18n "nav_map" }}</a>
            <a href="#contact">{{ i18n "nav_contact" }}</a>
            <a href="{{ i18n "other_lang_link" }}">{{ i18n "other_lang" }}</a>
        </nav>
    </header>

    <main>
        {{ block "main". }}{{ end }}
    </main>

    <footer>
        <p>{{ i18n "footer_address" }}: Quận 12, TP.HCM</p>
        <p>{{ i18n "footer_phone" }}: {{ i18n "phone" }}</p>
    </footer>
</body>
</html>
