- q: How much does a mini tattoo cost?
  a: Mini tattoos at Lan Pink Tattoo range from 500k-1.5M VND depending on size and complexity. Exact quote after free design consultation via Zalo.
- q: Does getting a tattoo hurt?
  a: Mild discomfort like an ant bite. We use Korean numbing cream so 90% of female clients say it's bearable, especially on arms, shoulders, back.
- q: How long does it take to heal?
  a: Outer layer heals in 7-10 days. Fully healed internally after 4-6 weeks. We offer free touch-up within 1 month.
- q: Is the tattoo ink safe?
  a: 100% Eternal Ink USA, FDA certified. Single-use needles, gloves, medical supplies. Autoclave sterilized to medical standards.
