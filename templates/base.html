<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand }} - {{ slogan }}{% endblock %}</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header>
        <h1>{{ brand }}</h1>
        <p>{{ slogan }}</p>
        <nav>
            <a href="#services">{{ nav_services }}</a>
            <a href="#gallery">{{ nav_gallery }}</a>
            <a href="#contact">{{ nav_contact }}</a>
            <a href="{{ other_lang_link }}" class="lang-switch">{{ other_lang }}</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer id="contact">
        <p><strong>{{ brand }}</strong></p>
        <p>{{ footer_address }}: {{ address }} | {{ footer_phone }}: {{ phone }}</p>
        <p>
            <a href="{{ instagram }}" target="_blank">Instagram</a> | 
            <a href="{{ facebook }}" target="_blank">Facebook</a>
        </p>
        <p>© 2026 {{ brand }}</p>
    </footer>
</body>
</html>
