<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta_title }}</title>
    <meta name="description" content="{{ meta_desc }}">
    <meta name="keywords" content="{{ keywords }}">
    <meta name="google-site-verification" content="_AvDEVXvok7vQ2TbOgCeybUAkOA9yRmK9VZfcuHPwFA" />
    
    <!-- Canonical + Language -->
    <link rel="canonical" href="{{ site_url }}{{ other_lang_link if lang == 'en' else '/' }}">
    <link rel="alternate" hreflang="vi" href="{{ site_url }}/">
    <link rel="alternate" hreflang="en" href="{{ site_url }}/en/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}{{ other_lang_link if lang == 'en' else '/' }}">
    <meta property="og:title" content="{{ meta_title }}">
    <meta property="og:description" content="{{ meta_desc }}">
    <meta property="og:image" content="{{ site_url }}/{{ og_image }}">
    <meta property="og:locale" content="{{ 'vi_VN' if lang == 'vi' else 'en_US' }}">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ site_url }}{{ other_lang_link if lang == 'en' else '/' }}">
    <meta property="twitter:title" content="{{ meta_title }}">
    <meta property="twitter:description" content="{{ meta_desc }}">
    <meta property="twitter:image" content="{{ site_url }}/{{ og_image }}">
    
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="icon" type="image/png" href="../static/images/favicon.png">
    
    <!-- Structured Data LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TattooShop",
      "name": "{{ brand }}",
      "image": "{{ site_url }}/{{ og_image }}",
      "description": "{{ meta_desc }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ address }}",
        "addressLocality": "Ho Chi Minh City",
        "addressRegion": "HCMC",
        "postalCode": "700000",
        "addressCountry": "VN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 10.8649477,
        "longitude": 106.6456056
      },
      "url": "{{ site_url }}",
      "telephone": "{{ phone }}",
      "priceRange": "500000-5000000 VND",
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "09:00",
        "closes": "20:00"
      }
    }
    </script>
    <script>
    </script>

    <script>
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TattooParlor",
      "name": "Lan Pink Tattoo",
      "image": "https://lanpinktattoo.netlify.app/assets/logo.png",
      "url": "https://lanpinktattoo.netlify.app",
      "telephone": "+84-70-365-9902x",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Gần cầu vượt Tân Thới Hiệp, quận 12",
        "addressLocality": "Ho Chi Minh City",
        "addressCountry": "VN"
      },
      "priceRange": "$$",
      "openingHours": "Mo-Su 09:00-21:00"
    }
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YHDTF0NDK7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag("js", new Date());
      gtag("config", "G-YHDTF0NDK7");
    </script>

</head>
<body>
    <header>
        <h1>{{ brand }}</h1>
        <p>{{ slogan }}</p>
        <nav>
            <a href="#services">{{ nav_services }}</a>
            <a href="#gallery">{{ nav_gallery }}</a>
            <a href="#map">{{ nav_map }}</a>
            <a href="#contact">{{ nav_contact }}</a>
            <a href="{{ other_lang_link }}" class="lang-switch" hreflang="{{ other_lang_code }}">{{ other_lang }}</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer id="contact">
        <p><strong>{{ brand }}</strong></p>
        <p>{{ footer_address }}: {{ address }} | {{ footer_phone }}: <a href="tel:{{ phone }}">{{ phone }}</a></p>
        <p>
            <a href="{{ instagram }}" target="_blank" rel="noopener">Instagram</a> | 
            <a href="{{ facebook }}" target="_blank" rel="noopener">Facebook</a>
        </p>
        <p>© 2026 {{ brand }}</p>
    </footer>
</body>
</html>
