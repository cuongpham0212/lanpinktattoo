<button
  id="lp-back-to-top"
  type="button"
  aria-label="{{ if eq .Language.Lang "vi" }}Lên đầu trang{{ else }}Back to top{{ end }}"
>
  ↑
</button>

<style>
  #lp-back-to-top {
    position: fixed;
    right: 14px;
    bottom: 16px;
    z-index: 60;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(236, 72, 153, 0.14);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);
    color: rgba(190, 24, 93, 0.78);
    font-size: 18px;
    font-weight: 900;
    line-height: 1;
    box-shadow: none;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    transition: opacity 0.22s ease, visibility 0.22s ease, transform 0.22s ease, background 0.22s ease;
  }

  #lp-back-to-top.is-visible {
    opacity: .72;
    visibility: visible;
    transform: translateY(0);
  }

  #lp-back-to-top:hover {
    opacity: .95;
    background: rgba(255, 255, 255, 0.28);
    color: #be185d;
  }

  html[data-theme="dark"] #lp-back-to-top {
    background: rgba(9, 9, 11, 0.16);
    color: rgba(251, 207, 232, 0.76);
    border-color: rgba(249, 168, 212, 0.14);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const button = document.getElementById('lp-back-to-top');

    if (!button) return;

    function toggleBackToTop() {
      if (window.scrollY > 420) {
        button.classList.add('is-visible');
      } else {
        button.classList.remove('is-visible');
      }
    }

    button.addEventListener('click', function () {
      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });

    window.addEventListener('scroll', toggleBackToTop, { passive: true });
    toggleBackToTop();
  });
</script>
