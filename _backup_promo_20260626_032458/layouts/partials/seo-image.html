{{- $img := .Params.og_image | default .Params.image | default .Params.featured_image -}}
{{- $images := partial "image-variants.html" (dict "src" $img) -}}

{{- if $img -}}
  <meta property="og:image" content="{{ $images.og.abs }}">
  <meta property="og:image:width" content="{{ $images.og.width }}">
  <meta property="og:image:height" content="{{ $images.og.height }}">
  <meta name="twitter:image" content="{{ $images.og.abs }}">
{{- end -}}
