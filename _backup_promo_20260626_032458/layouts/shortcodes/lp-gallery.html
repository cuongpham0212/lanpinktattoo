{{- $slug := .Get "slug" -}}
{{- $data := index site.Data.lanpink_images $slug -}}

<style>
.lp-json-gallery {
  margin: 30px auto 38px;
}

.lp-json-gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
}

.lp-json-gallery-grid button {
  display: block;
  width: 100%;
  padding: 8px;
  border-radius: 22px;
  background: rgba(255,255,255,.88);
  border: 1px solid rgba(255,118,184,.38);
  box-shadow: 0 14px 30px rgba(177,62,119,.11);
  cursor: zoom-in;
  transition: .22s ease;
}

.lp-json-gallery-grid button:hover {
  transform: translateY(-5px);
  box-shadow: 0 22px 42px rgba(177,62,119,.17);
}

.lp-json-gallery-grid img {
  display: block;
  width: 100%;
  aspect-ratio: 4 / 5;
  height: auto;
  object-fit: cover;
  object-position: center;
  border-radius: 16px;
}

.lp-gallery-lightbox {
  position: fixed !important;
  inset: 0 !important;
  z-index: 999999 !important;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(18,8,14,.92);
}

.lp-gallery-lightbox.is-open {
  display: flex;
}

.lp-gallery-lightbox-img {
  display: block;
  user-select: none;
  -webkit-user-drag: none;
  touch-action: none;
  max-width: 88vw;
  max-height: 78vh;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 18px;
  box-shadow: 0 28px 80px rgba(0,0,0,.46);
}

.lp-gallery-close,
.lp-gallery-prev,
.lp-gallery-next,
.lp-gallery-zoom-in,
.lp-gallery-zoom-out,
.lp-gallery-zoom-reset {
  position: fixed !important;
  z-index: 1000000 !important;
  border: 0;
  border-radius: 999px;
  background: rgba(255,255,255,.95);
  color: #7a224c;
  cursor: pointer;
}

.lp-gallery-close {
  top: 18px;
  right: 22px;
  width: 46px;
  height: 46px;
  font-size: 32px;
}

.lp-gallery-prev,
.lp-gallery-next {
  top: 50%;
  width: 50px;
  height: 50px;
  transform: translateY(-50%);
  font-size: 34px;
}

.lp-gallery-prev { left: 22px; }
.lp-gallery-next { right: 22px; }

.lp-gallery-zoom-controls {
  position: fixed !important;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000000 !important;
  display: flex;
  gap: 10px;
}

.lp-gallery-zoom-in,
.lp-gallery-zoom-out,
.lp-gallery-zoom-reset {
  width: 42px;
  height: 42px;
  font-size: 22px;
  font-weight: 800;
}

.lp-gallery-zoom-reset {
  width: auto;
  padding: 0 14px;
  font-size: 14px;
}

.lp-gallery-lightbox-img.is-zoomed {
  cursor: grab;
}

.lp-gallery-counter {
  position: fixed !important;
  top: 24px;
  left: 24px;
  z-index: 1000000;
  color: #fff;
  font-weight: 700;
}

@media (max-width: 900px) {
  .lp-json-gallery-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 560px) {
  .lp-json-gallery-grid {
    grid-template-columns: 1fr;
  }

  .lp-gallery-lightbox-img {
    max-width: 92vw;
    max-height: 74vh;
  }
}
</style>

{{- if $data }}
<section class="lp-json-gallery" aria-label="{{ $data.alt | default $slug }}">
  {{- with $data.images }}
  <div class="lp-json-gallery-grid">
    {{- range $index, $src := . }}
    <button type="button" class="lp-gallery-open" data-src="{{ $src | safeURL }}" data-index="{{ $index }}">
      <img src="{{ $src | safeURL }}" alt="{{ $data.alt | default $slug }}" loading="lazy">
    </button>
    {{- end }}
  </div>
  {{- end }}
</section>

<div class="lp-gallery-lightbox" aria-hidden="true">
  <div class="lp-gallery-counter"></div>
  <button class="lp-gallery-close" type="button">×</button>
  <div class="lp-gallery-zoom-controls">
    <button class="lp-gallery-zoom-out" type="button" aria-label="Thu nhỏ ảnh">−</button>
    <button class="lp-gallery-zoom-reset" type="button" aria-label="Đặt lại zoom">100%</button>
    <button class="lp-gallery-zoom-in" type="button" aria-label="Phóng to ảnh">+</button>
  </div>
  <button class="lp-gallery-prev" type="button">‹</button>
  <img class="lp-gallery-lightbox-img" src="" alt="">
  <button class="lp-gallery-next" type="button">›</button>
</div>

<script>
(function () {
  const gallery = document.currentScript.previousElementSibling.previousElementSibling;
  const buttons = Array.from(gallery.querySelectorAll('.lp-gallery-open'));
  const lightbox = document.currentScript.previousElementSibling;

  document.body.appendChild(lightbox);

  const img = lightbox.querySelector('.lp-gallery-lightbox-img');
  const closeBtn = lightbox.querySelector('.lp-gallery-close');
  const prevBtn = lightbox.querySelector('.lp-gallery-prev');
  const nextBtn = lightbox.querySelector('.lp-gallery-next');
  const counter = lightbox.querySelector('.lp-gallery-counter');
  const zoomInBtn = lightbox.querySelector('.lp-gallery-zoom-in');
  const zoomOutBtn = lightbox.querySelector('.lp-gallery-zoom-out');
  const zoomResetBtn = lightbox.querySelector('.lp-gallery-zoom-reset');

  let current = 0;
  let zoom = 1;
  let posX = 0;
  let posY = 0;
  let dragging = false;
  let startX = 0;
  let startY = 0;

  function applyZoom() {
    img.style.transform = 'translate(' + posX + 'px, ' + posY + 'px) scale(' + zoom + ')';
    img.style.transition = dragging ? 'none' : 'transform .18s ease';
    zoomResetBtn.textContent = Math.round(zoom * 100) + '%';
    img.classList.toggle('is-zoomed', zoom > 1);
  }

  function resetZoom() {
    zoom = 1;
    posX = 0;
    posY = 0;
    applyZoom();
  }

  function zoomBy(step) {
    zoom = Math.max(1, Math.min(3, +(zoom + step).toFixed(2)));
    if (zoom === 1) {
      posX = 0;
      posY = 0;
    }
    applyZoom();
  }

  function show(index) {
    current = (index + buttons.length) % buttons.length;
    const btn = buttons[current];
    img.src = btn.dataset.src;
    img.alt = btn.querySelector('img')?.alt || '';
    counter.textContent = (current + 1) + ' / ' + buttons.length;
    resetZoom();
  }

  function open(index) {
    show(index);
    lightbox.classList.add('is-open');
    lightbox.setAttribute('aria-hidden', 'false');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lightbox.classList.remove('is-open');
    lightbox.setAttribute('aria-hidden', 'true');
    img.src = '';
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
  }

  buttons.forEach((btn, index) => {
    btn.addEventListener('click', () => open(index));
  });

  closeBtn.addEventListener('click', close);
  prevBtn.addEventListener('click', () => show(current - 1));
  nextBtn.addEventListener('click', () => show(current + 1));
  zoomInBtn.addEventListener('click', () => zoomBy(0.25));
  zoomOutBtn.addEventListener('click', () => zoomBy(-0.25));
  zoomResetBtn.addEventListener('click', resetZoom);

  img.addEventListener('dblclick', function () {
    if (zoom === 1) zoomBy(1);
    else resetZoom();
  });

  img.setAttribute('draggable', 'false');

  img.addEventListener('dragstart', function (e) {
    e.preventDefault();
  });

  img.addEventListener('pointerdown', function (e) {
    if (zoom <= 1) return;
    e.preventDefault();
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
    img.setPointerCapture(e.pointerId);
    img.style.cursor = 'grabbing';
  });

  img.addEventListener('pointermove', function (e) {
    if (!dragging) return;
    e.preventDefault();
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    applyZoom();
  });

  img.addEventListener('pointerup', function (e) {
    dragging = false;
    try { img.releasePointerCapture(e.pointerId); } catch (err) {}
    img.style.cursor = zoom > 1 ? 'grab' : '';
    applyZoom();
  });

  img.addEventListener('pointercancel', function (e) {
    dragging = false;
    try { img.releasePointerCapture(e.pointerId); } catch (err) {}
    img.style.cursor = zoom > 1 ? 'grab' : '';
    applyZoom();
  });

  lightbox.addEventListener('wheel', function (e) {
    if (!lightbox.classList.contains('is-open')) return;
    e.preventDefault();
    zoomBy(e.deltaY < 0 ? 0.15 : -0.15);
  }, { passive: false });

  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (!lightbox.classList.contains('is-open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
})();
</script>
{{- else }}
<p style="color:red;">Không tìm thấy gallery JSON cho slug: {{ $slug }}</p>
{{- end }}
