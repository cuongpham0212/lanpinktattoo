{{ $src := .Destination | safeURL }}
{{ $alt := .Text | plainify }}
{{ $caption := .Title | plainify }}

<figure class="lp-md-image">
  <img
    src="{{ $src }}"
    alt="{{ $alt }}"
    loading="lazy"
    decoding="async"
  >

  {{ with $caption }}
  <figcaption>
    {{ . }}
  </figcaption>
  {{ end }}
</figure>
