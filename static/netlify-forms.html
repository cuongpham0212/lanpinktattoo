<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Netlify Forms</title>
</head>
<body>
  <form name="booking-consultation" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="booking-consultation">
    <input name="bot-field">
    <input name="language">
    <input name="date">
    <input name="name">
    <input name="phone">
    <input name="time">
    <textarea name="description"></textarea>
    <button type="submit">Send</button>
  </form>
</body>
</html>
