[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.highlight]
    noClasses = false
    style = "monokai"

[params]
  author = "Lan Pink"
  studio = "Lan Pink Tattoo"
  city = "Ho Chi Minh City"
  email = "hello@lanpinktattoo.com"
  phone = "+84 703 659 902"
  instagram = "https://www.instagram.com/lanpink.ink/"
  facebook = "https://www.facebook.com/LanPinkInk"
  messenger = "https://m.me/LanPinkInk"
  googleBusiness = "https://maps.app.goo.gl/FWkCMzaZBN5G6rZJ9"
  bookingUrl = "https://m.me/LanPinkInk"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[related]
  threshold = 50
  includeNewer = true
  toLower = true

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "title"
    weight = 70

  [[related.indices]]
    name = "description"
    weight = 50
